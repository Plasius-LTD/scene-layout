name: CD (Publish to npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

env:
  FALLBACK_RUNNER_LABEL: ubuntu-latest
  SELF_HOSTED_RUNNER_LABELS: '["self-hosted","Linux","X64"]'

jobs:
  select-runner:
    name: Select runner
    runs-on: ubuntu-latest
    outputs:
      runner_labels: ${{ steps.select.outputs.runner_labels }}
    steps:
      - name: Prefer idle self-hosted runner
        id: select
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RUNNER_SELECTOR_TOKEN || github.token }}
          script: |
            const selfHostedLabels = JSON.parse(process.env.SELF_HOSTED_RUNNER_LABELS)
            const fallbackRunner = process.env.FALLBACK_RUNNER_LABEL
            let selectedRunnerJson = JSON.stringify(fallbackRunner)

            try {
              const runners = await github.paginate(
                github.rest.actions.listSelfHostedRunnersForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                }
              )

              const hasMatchingIdleRunner = runners.some((runner) => {
                const labels = new Set((runner.labels || []).map((label) => label.name))
                return (
                  runner.status === "online" &&
                  runner.busy === false &&
                  selfHostedLabels.every((label) => labels.has(label))
                )
              })

              if (hasMatchingIdleRunner) {
                selectedRunnerJson = JSON.stringify(selfHostedLabels)
                core.info(`Selected self-hosted runner labels ${selfHostedLabels.join(", ")}.`)
              } else {
                core.info(
                  `No idle self-hosted runner with labels ${selfHostedLabels.join(", ")} was found; falling back to ${fallbackRunner}.`
                )
              }
            } catch (error) {
              core.warning(
                `Could not inspect self-hosted runners; falling back to ${fallbackRunner}. ${error.message}`
              )
            }

            core.setOutput("runner_labels", selectedRunnerJson)

  prepare-release-pr:
    if: github.event_name == 'workflow_dispatch'
    needs: select-runner
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner_labels) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Prepare protected-branch-safe release PR
        id: prep
        env:
          BUMP: ${{ inputs.bump }}
          PREID: ${{ inputs.preid }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --tags

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          case "${BUMP:-patch}" in
            major|minor|patch)
              if [ -n "${PREID:-}" ]; then
                case "${BUMP}" in
                  major) npm version premajor --preid "${PREID}" --no-git-tag-version >/dev/null ;;
                  minor) npm version preminor --preid "${PREID}" --no-git-tag-version >/dev/null ;;
                  patch) npm version prepatch --preid "${PREID}" --no-git-tag-version >/dev/null ;;
                esac
              else
                npm version "${BUMP}" --no-git-tag-version >/dev/null
              fi
              ;;
            none)
              echo "Leaving package.json version unchanged at ${CURRENT_VERSION}."
              ;;
            *)
              echo "Unknown bump type: ${BUMP}" >&2
              exit 1
              ;;
          esac

          NEXT_VERSION=$(node -p "require('./package.json').version")
          TAG="v${NEXT_VERSION}"
          BRANCH="release/${TAG}"

          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Release branch ${BRANCH} already exists." >&2
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${NEXT_VERSION}" version >/dev/null 2>&1; then
            echo "Package ${PACKAGE_NAME}@${NEXT_VERSION} is already published." >&2
            exit 1
          fi

          FILE="CHANGELOG.md"
          if [ -f "${FILE}" ] && ! grep -q "^## \[${NEXT_VERSION}\]" "${FILE}"; then
            DATE=$(date -u +%Y-%m-%d)
            VERSION_LINE="## [${NEXT_VERSION}] - ${DATE}"

            UNREL_START=$(grep -n '^## \[Unreleased\]' "${FILE}" | cut -d: -f1 || true)
            if [ -n "${UNREL_START}" ]; then
              NEXT_HDR=$(awk 'NR>'"${UNREL_START}"' && /^## \[/{print NR; exit}' "${FILE}")
              if [ -z "${NEXT_HDR}" ]; then
                NEXT_HDR=$(wc -l < "${FILE}")
                NEXT_HDR=$((NEXT_HDR + 1))
              fi

              HEADER=$(sed -n "1,${UNREL_START}p" "${FILE}")
              UNREL_CONTENT=$(sed -n "$((UNREL_START + 1)),$((NEXT_HDR - 1))p" "${FILE}")
              TAIL=$(sed -n "${NEXT_HDR},\$p" "${FILE}")

              NEW_UNRELEASED=$(printf '%s\n' \
                '' \
                '- **Added**' \
                '  - (placeholder)' \
                '' \
                '- **Changed**' \
                '  - (placeholder)' \
                '' \
                '- **Fixed**' \
                '  - (placeholder)' \
                '' \
                '- **Security**' \
                '  - (placeholder)')

              TMP_FILE=$(mktemp)
              {
                printf "%s\n" "${HEADER}"
                printf "%s\n\n" "${NEW_UNRELEASED}"
                printf "%s\n" "${VERSION_LINE}"
                if [ -z "$(echo "${UNREL_CONTENT}" | tr -d '\n' | tr -d '[:space:]')" ]; then
                  printf "### Changed\n- (no notable changes)\n\n"
                else
                  printf "%s\n\n" "${UNREL_CONTENT}"
                fi
                printf "%s\n" "${TAIL}"
              } > "${TMP_FILE}"

              mv "${TMP_FILE}" "${FILE}"

              COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/v${NEXT_VERSION}...HEAD"
              awk -v repl="[Unreleased]: ${COMPARE_URL}" 'BEGIN{OFS=FS} { if ($0 ~ /^\[Unreleased\]: /) { print repl } else { print } }' "${FILE}" > "${FILE}.tmp"
              mv "${FILE}.tmp" "${FILE}"

              if ! grep -q "^\[${NEXT_VERSION}\]:" "${FILE}"; then
                echo "[${NEXT_VERSION}]: https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${NEXT_VERSION}" >> "${FILE}"
              fi
            fi
          fi

          git checkout -b "${BRANCH}" origin/main
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          if [ -f "${FILE}" ]; then
            git add "${FILE}"
          fi

          if git diff --cached --quiet; then
            echo "No release metadata changes were produced; refusing to open an empty release PR." >&2
            exit 1
          fi

          git commit -m "chore: prepare release ${TAG} [skip ci]"
          git push origin "${BRANCH}"

          PR_BODY=$(cat <<EOF
          ## Summary
          - prepare ${PACKAGE_NAME} ${TAG} for protected-branch-safe release
          - promote the current Unreleased changelog entries into ${TAG}
          - unblock npm publication by merging release metadata through a pull request instead of a direct main push

          ## Follow-up
          - merge this PR into main
          - allow the push-triggered CD workflow to tag, publish to npm, and publish the GitHub release from versioned main
          EOF
          )

          PR_URL=$(gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${BRANCH}" \
            --title "chore: prepare release ${TAG}" \
            --body "${PR_BODY}")

          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Summarize release PR
        run: |
          {
            echo "Prepared protected-branch-safe release PR:"
            echo "- branch: ${{ steps.prep.outputs.branch }}"
            echo "- tag: ${{ steps.prep.outputs.tag }}"
            echo "- PR: ${{ steps.prep.outputs.pr_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    if: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: prepare release v') }}"
    needs: select-runner
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner_labels) }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Determine publish metadata
        id: pkg
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          NAME=$(node -p "require('./package.json').name")

          PUBLISHED=""
          if npm view "${NAME}" version >/dev/null 2>&1; then
            PUBLISHED=$(npm view "${NAME}" version)
          fi

          SHOULD_PUBLISH=false
          FLAGS=""
          if [ -z "${PUBLISHED}" ] || [ "${PUBLISHED}" != "${VERSION}" ]; then
            SHOULD_PUBLISH=true
            if [ -z "${PUBLISHED}" ]; then
              FLAGS="--access public"
            fi
          fi

          if [ "${SHOULD_PUBLISH}" = "true" ] && [ -f CHANGELOG.md ] && ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a ${VERSION} section before publish." >&2
            exit 1
          fi

          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "flags=${FLAGS}" >> "${GITHUB_OUTPUT}"
          echo "should_publish=${SHOULD_PUBLISH}" >> "${GITHUB_OUTPUT}"

      - name: Skip when main does not carry a new package version
        if: steps.pkg.outputs.should_publish != 'true'
        run: echo "Package version ${{ steps.pkg.outputs.version }} is already published; nothing to release."

      - name: Install deps (CI)
        if: steps.pkg.outputs.should_publish == 'true'
        run: npm ci

      - name: Test (coverage)
        if: steps.pkg.outputs.should_publish == 'true'
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        if: steps.pkg.outputs.should_publish == 'true'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true
          slug: ${{ github.repository }}

      - name: Build
        if: steps.pkg.outputs.should_publish == 'true'
        run: npm run build --if-present

      - name: Generate SBOM (CycloneDX)
        if: steps.pkg.outputs.should_publish == 'true'
        run: npm sbom --sbom-format=cyclonedx --sbom-type=library --omit dev > sbom.cdx.json

      - name: Attest SBOM (GitHub Artifact Attestations)
        if: steps.pkg.outputs.should_publish == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom.cdx.json

      - name: Ensure release tag exists on main
        if: steps.pkg.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          git fetch origin --tags
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
            exit 0
          fi

          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Create GitHub Release draft (immutable-safe)
        if: steps.pkg.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
            if [ "${IS_DRAFT}" != "true" ]; then
              echo "Release ${TAG} already exists and is published. Immutable releases cannot be modified after publication; cut a new version instead."
              exit 1
            fi

            echo "Draft release ${TAG} already exists; refreshing mutable assets."
            if [ -f sbom.cdx.json ]; then
              gh release upload "${TAG}" sbom.cdx.json --clobber
            fi
          else
            if [ -f sbom.cdx.json ]; then
              gh release create "${TAG}" sbom.cdx.json \
                --title "Release ${TAG}" \
                --generate-notes \
                --verify-tag \
                --draft
            else
              gh release create "${TAG}" \
                --title "Release ${TAG}" \
                --generate-notes \
                --verify-tag \
                --draft
            fi
          fi

      - name: Publish
        if: steps.pkg.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ${{ steps.pkg.outputs.flags }} --provenance

      - name: Publish GitHub Release
        if: steps.pkg.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Expected draft release ${TAG} to exist before publication."
            exit 1
          fi

          IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
          if [ "${IS_DRAFT}" = "true" ]; then
            gh release edit "${TAG}" --draft=false --latest
          else
            echo "Release ${TAG} is already published; skipping publication."
          fi
